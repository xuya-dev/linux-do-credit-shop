# ============================================================
# LDC Shop - 一键部署 (独立模式)
# Standalone Mode - 自动安装 MySQL + Redis
#
# 使用方法 / Usage:
#   docker compose -f docker-compose.standalone.yml up -d
#
# 首次部署前请: cp .env.example .env 并修改配置
# Before first deploy: cp .env.example .env and modify
# ============================================================

services:
  # ============================================================
  # MySQL 8.x 数据库 / MySQL Database
  # 自动创建数据库并执行 sql/init.sql
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: ldc-shop-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ldc_shop_2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ldc_shop}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_EXTERNAL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=200
      --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-ldc_shop_2024}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ldc-net

  # ============================================================
  # Redis 7.x 缓存 / Redis Cache
  # Sa-Token 会话存储 + 业务缓存
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: ldc-shop-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-ldc_shop_redis_2024}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-ldc_shop_redis_2024}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ldc-net

  # ============================================================
  # LDC Shop 应用 (前端+后端 单容器) / Application
  # Spring Boot 提供后端 API + 前端静态文件
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: ldc-shop-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:8080"
    environment:
      # ---- MySQL ----
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ldc_shop}
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ldc_shop_2024}
      # ---- Redis ----
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-ldc_shop_redis_2024}
      # ---- Sa-Token ----
      SA_TOKEN_JWT_SECRET: ${SA_TOKEN_JWT_SECRET:-please-change-this-secret-in-production}
      # ---- OAuth ----
      LDC_OAUTH_CLIENT_ID: ${LDC_OAUTH_CLIENT_ID:-}
      LDC_OAUTH_CLIENT_SECRET: ${LDC_OAUTH_CLIENT_SECRET:-}
      LDC_OAUTH_REDIRECT_URI: ${LDC_OAUTH_REDIRECT_URI:-http://localhost/auth/callback}
      # ---- 支付 ----
      LDC_PAYMENT_CLIENT_ID: ${LDC_PAYMENT_CLIENT_ID:-}
      LDC_PAYMENT_CLIENT_SECRET: ${LDC_PAYMENT_CLIENT_SECRET:-}
      LDC_PAYMENT_NOTIFY_URL: ${LDC_PAYMENT_NOTIFY_URL:-http://localhost/api/order/notify}
      LDC_PAYMENT_RETURN_URL: ${LDC_PAYMENT_RETURN_URL:-http://localhost/order/result}
      # ---- 管理员 ----
      LDC_ADMIN_USERNAMES: ${LDC_ADMIN_USERNAMES:-admin,root}
      # ---- JVM ----
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx512m -XX:+UseG1GC}
      TZ: Asia/Shanghai
    volumes:
      - app_logs:/app/logs
    networks:
      - ldc-net

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local

networks:
  ldc-net:
    driver: bridge
