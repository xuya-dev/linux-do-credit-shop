# ============================================================
# LDC Shop 应用配置 / LDC Shop Application Configuration
# 支持环境变量覆盖 / Supports environment variable override
# ============================================================

server:
  port: 3000
  shutdown: graceful

# Spring 配置 / Spring Configuration
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  application:
    name: ldc-shop

  # Flyway 数据库迁移 / Database Migration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  # 数据源配置 / DataSource Configuration
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:ldc_shop}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}

  # Redis 配置 / Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  # Jackson 配置 / JSON Configuration
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

  # JDK 21 虚拟线程 / JDK 21 Virtual Threads
  threads:
    virtual:
      enabled: true

  # 国际化配置 / i18n Configuration
  messages:
    basename: i18n/messages
    encoding: UTF-8
  web:
    locale: zh_CN
    locale-resolver: accept-header

# MyBatis-Plus 配置 / MyBatis-Plus Configuration
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: dev.xuya.ldcshop.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Sa-Token 配置 / Sa-Token Configuration
sa-token:
  token-name: ${SA_TOKEN_NAME:Authorization}
  timeout: ${SA_TOKEN_TIMEOUT:86400}
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-prefix: Bearer
  is-log: false
  jwt-secret-key: ${SA_TOKEN_JWT_SECRET:}
  is-read-cookie: false

# Spring Boot Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized


logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:-}] %-5level %logger{36} - %msg%n"

# Knife4j 配置 / API Documentation Configuration
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: user
      paths-to-match: /api/user/**
    - group: admin
      paths-to-match: /api/admin/**

# ============================================================
# LDC Shop 自定义配置 / LDC Shop Custom Configuration
# ============================================================
ldc-shop:
  # CORS 跨域配置 / CORS Configuration
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5176}

  # LINUX DO OAuth 配置（登录前必须可用，不可放DB）/ LINUX DO OAuth Config (required before login, cannot be DB-only)
  oauth:
    client-id: ${LDC_OAUTH_CLIENT_ID:}
    client-secret: ${LDC_OAUTH_CLIENT_SECRET:}
    redirect-uri: ${LDC_OAUTH_REDIRECT_URI:}
    authorize-url: ${LDC_OAUTH_AUTHORIZE_URL:https://connect.linux.do/oauth2/authorize}
    token-url: ${LDC_OAUTH_TOKEN_URL:https://connect.linux.do/oauth2/token}
    user-info-url: ${LDC_OAUTH_USER_INFO_URL:https://connect.linux.do/api/user}

  # 管理员配置（登录时判断角色）/ Admin Config (used during login to determine role)
  admin:
    initial-usernames: ${LDC_ADMIN_USERNAMES:admin,root}

  # 限流配置 / Rate Limit Configuration
  rate-limit:
    max-requests: ${RATE_LIMIT_MAX:60}
    window-seconds: ${RATE_LIMIT_WINDOW:60}

  # 订单配置 / Order Configuration
  order:
    auto-close-minutes: ${ORDER_AUTO_CLOSE_MINUTES:30}

  # 卡密加密密钥 / Card Content Encryption Secret
  card-encrypt-secret: ${CARD_ENCRYPT_SECRET:please-change-this-secret-in-production}
