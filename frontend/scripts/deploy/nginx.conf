
worker_processes auto;

events {
  worker_connections 4096;
}

http {
  include mime.types;
  default_type application/octet-stream;

  types {
    application/javascript  js mjs;
    text/css                css;
    text/html               html;
    application/wasm        wasm;
    font/woff2              woff2;
  }

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;

  gzip on;
  gzip_buffers 32 16k;
  gzip_comp_level 6;
  gzip_min_length 1k;
  gzip_types text/plain text/css application/javascript application/json
             application/x-javascript text/xml application/xml
             application/xml+rss text/javascript image/svg+xml
             application/wasm font/woff2;
  gzip_vary on;

  # Serve pre-compressed gzip files
  gzip_static on;

  server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;

    # Hashed static assets — aggressive long-term cache
    location ~* ^/(js|css|assets)/.+\-[0-9a-f]{8,}\.(js|css|woff2?|png|jpg|svg|ico|wasm)$ {
      expires 365d;
      add_header Cache-Control "public, immutable";
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
    }

    # index.html and other unhashed files — no cache
    location / {
      try_files $uri $uri/ /index.html;
      index index.html;

      add_header Cache-Control "no-cache, no-store, must-revalidate";
      add_header Pragma "no-cache";
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self';" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
      add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }
  }
}
